openapi: 3.1.1
info:
  title: EMS frontend API
  description: An API for accessing configuration page of EEPROM Monitoring Server
  license:
    name: GNU General Public License version 3 or later
    identifier: GPL-3.0-or-later
  version: 0.1.0

paths:
  /signin:
    get:
      summary: Load signin page
      responses:
        200:
          description: Returns the signin landing page
    post:
      summary: Handle login
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                login:
                  type: string
                  format: email
                  pattern: '^([-_.a-zA-Z0-9]){2,32}$'
                  minLength: 2
                  maxLength: 32
                password:
                  type: string
                  format: password
              required:
                - login
                - password
      responses:
        200:
          description: Wrong credentials
        303:
          description: Login success

  /:
    get:
      summary: Main configuration page
      responses:
        200:
          description: Returns the main configuration page
      security:
        - cookieAuth: []

  /new:
    get:
      summary: Load New device page
      responses:
        200:
          description: Returns the New device page
    post:
      summary: Create new device
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                hostname:
                  type: string
                ip:
                  type: string
                ip-type:
                  type: integer
                  pattern: '^[46]$'
                login:
                  type: string
                password:
                  type: string
                  format: password
                key:
                  type: string
                  format: binary
              required:
                - hostname
                - ip
                - ip-type
                - login
      responses:
        200:
          description: Returns New device page (might be with error)
        303:
          description: Creates device and redirects to /
      security:
        - cookieAuth: []

  /edit:
    get:
      summary: Load Edit device page
      parameters:
        - in: query
          name: edit-id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Returns the Edit device page
      security:
        - cookieAuth: []
    post:
      summary: Update device
      parameters:
        - in: query
          name: edit-id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                hostname:
                  type: string
                ip:
                  type: string
                ip-type:
                  type: integer
                  pattern: '^[46]$'
                login:
                  type: string
                password:
                  type: string
                  format: password
                key:
                  type: string
                  format: binary
              required:
                - hostname
                - ip
                - ip-type
                - login
      responses:
        200:
          description: Returns Edit device page (might be with error)
        303:
          description: Updates device and redirects to /
      security:
        - cookieAuth: []

  /delete:
    post:
      summary: Load Edit device page
      parameters:
        - in: query
          name: delete-id
          required: true
          schema:
            type: integer
      responses:
        303:
          description: Deletes device and redirects to /
      security:
        - cookieAuth: []

  /logout:
    get:
      summary: Log out
      responses:
        303:
          description: Deletes device and redirects to /

  /favicon.ico:
    get:
      summary: Serve the favicon
      responses:
        200:
          description: The favicon
          content:
            image/x-icon:
              schema:
                type: string
                format: binary

  /style.css:
    get:
      summary: Serve the CSS stylesheet
      responses:
        200:
          description: The CSS stylesheet
          content:
            text/css:
              schema:
                type: string

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      name: session_token
      in: cookie
